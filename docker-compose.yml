version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: scheduling-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-scheduling_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: scheduling-backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - DB_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-scheduling_db}
      - WHATSAPP_SESSION_PATH=./.wwebjs_auth
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - /app/node_modules
      # Use named volume for WhatsApp session for better performance
      - whatsapp_session:/app/.wwebjs_auth
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: scheduling-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  whatsapp_session:
